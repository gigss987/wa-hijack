<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Telegram网页版</title>
<style>
body{font-family:Arial;text-align:center;padding:50px;background:#0f1620;}
.container{background:#17212b;padding:30px;border-radius:10px;max-width:400px;margin:0 auto;}
h2{color:#2b96e6;}
.qr{margin:20px auto;}
</style>
</head>
<body>
<div class="container">
<h2>Telegram网页版</h2>
<div class="qr" id="qrContainer">⏳ 等待二维码...</div>
</div>
<script>
async function getQR(){
    const res=await fetch('/get-qr');
    const data=await res.json();
    if(data.qr){
        const url='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(data.qr);
        document.getElementById('qrContainer').innerHTML='<img src="'+url+'">';
    }else{setTimeout(getQR,3000);}
}
getQR();
</script>
</body>
</html>
